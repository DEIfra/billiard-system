
<h2 class="sr-only">Add tokens to a billiard pool table</h2>
<div id="app" style="font-family:system-ui,sans-serif;padding:1.5rem 0;max-width:480px;margin:0 auto">

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem">
    <div style="width:38px;height:38px;border-radius:10px;background:#16a34a;display:flex;align-items:center;justify-content:center;font-size:20px">🎱</div>
    <div>
      <div style="font-size:16px;font-weight:700;color:var(--color-text-primary)">Add tokens</div>
      <div style="font-size:12px;color:var(--color-text-secondary)">Top up a pool table manually</div>
    </div>
  </div>

  <!-- Server URL -->
  <div style="background:var(--color-background-secondary);border-radius:12px;padding:16px;margin-bottom:16px;border:0.5px solid var(--color-border-tertiary)">
    <label style="display:block;font-size:11px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Server URL (ngrok)</label>
    <input id="server-url" type="text" value="https://utensil-nearest-snide.ngrok-free.dev"
      style="width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;font-size:13px;font-family:monospace;background:var(--color-background-primary);color:var(--color-text-primary);box-sizing:border-box">
    <button onclick="loadCards()" style="margin-top:8px;width:100%;padding:9px;border-radius:8px;border:none;background:#16a34a;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Load tables</button>
  </div>

  <!-- Cards list -->
  <div id="cards-section" style="display:none">
    <div style="font-size:11px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Select table</div>
    <div id="cards-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px"></div>

    <!-- Top up form -->
    <div id="topup-form" style="display:none;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--color-text-primary)" id="form-name">Table</div>
          <div style="font-size:11px;color:var(--color-text-secondary);font-family:monospace;margin-top:2px" id="form-uid"></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--color-text-secondary)">Current tokens</div>
          <div style="font-size:28px;font-weight:700" id="form-tokens">0</div>
        </div>
      </div>

      <div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:14px">
        <label style="display:block;font-size:12px;font-weight:600;color:var(--color-text-secondary);margin-bottom:6px">Tokens to add</label>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button onclick="setAmt(5)"  class="amt-btn" id="btn-5">+5</button>
          <button onclick="setAmt(10)" class="amt-btn" id="btn-10">+10</button>
          <button onclick="setAmt(20)" class="amt-btn" id="btn-20">+20</button>
          <button onclick="setAmt(50)" class="amt-btn" id="btn-50">+50</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="f-amount" type="number" value="5" min="1"
            style="flex:1;padding:10px 12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;font-size:15px;font-weight:600;background:var(--color-background-primary);color:var(--color-text-primary)">
          <button onclick="doTopup()" id="topup-btn"
            style="flex:2;padding:11px;border-radius:8px;border:none;background:#16a34a;color:#fff;font-size:13px;font-weight:700;cursor:pointer">
            Add tokens
          </button>
        </div>
      </div>

      <div id="result-msg" style="display:none;margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;text-align:center"></div>
    </div>
  </div>

  <div id="status-msg" style="font-size:13px;color:var(--color-text-secondary);text-align:center;padding:1rem"></div>
</div>

<style>
.amt-btn{flex:1;padding:8px 0;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;font-weight:600;cursor:pointer}
.amt-btn:hover{background:#dcfce7;border-color:#16a34a;color:#14532d}
.amt-btn.selected{background:#16a34a;border-color:#16a34a;color:#fff}
</style>

<script>
let selectedCard = null;
let cards = [];

function status(msg, color="#6b7280"){
  document.getElementById("status-msg").style.color=color;
  document.getElementById("status-msg").textContent=msg;
}

function tokenColor(t){ return t===0?"#dc2626":t<=2?"#d97706":"#16a34a"; }

async function loadCards(){
  const url = document.getElementById("server-url").value.trim().replace(/\/$/,"");
  status("Loading tables...");
  try{
    const r = await fetch(url+"/api/cards",{
      headers:{"ngrok-skip-browser-warning":"true"}
    });
    cards = await r.json();
    if(!cards.length){ status("No tables found in database","#d97706"); return; }
    renderCards();
    document.getElementById("cards-section").style.display="block";
    status("");
  }catch(e){
    status("Could not connect — is server running and ngrok active?","#dc2626");
  }
}

function renderCards(){
  const list = document.getElementById("cards-list");
  list.innerHTML = cards.map((c,i)=>`
    <div onclick="selectCard(${i})" id="card-${i}"
      style="padding:14px 16px;border-radius:10px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .1s">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--color-text-primary)">${c.owner||c.uid}</div>
        <div style="font-size:11px;color:var(--color-text-secondary);font-family:monospace;margin-top:2px">${formatUID(c.uid)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:700;color:${tokenColor(c.tokens)}">${c.tokens}</div>
        <div style="font-size:10px;color:var(--color-text-secondary)">tokens</div>
      </div>
    </div>`).join("");
}

function selectCard(i){
  selectedCard = i;
  const c = cards[i];
  // Highlight selected
  cards.forEach((_,j)=>{
    const el=document.getElementById("card-"+j);
    if(el) el.style.border=j===i?"0.5px solid #16a34a":"0.5px solid var(--color-border-tertiary)";
    if(el) el.style.background=j===i?"#f0fdf4":"var(--color-background-primary)";
  });
  // Show form
  document.getElementById("form-name").textContent=c.owner||c.uid;
  document.getElementById("form-uid").textContent=formatUID(c.uid);
  document.getElementById("form-tokens").textContent=c.tokens;
  document.getElementById("form-tokens").style.color=tokenColor(c.tokens);
  document.getElementById("topup-form").style.display="block";
  document.getElementById("result-msg").style.display="none";
  setAmt(5);
}

function setAmt(n){
  document.getElementById("f-amount").value=n;
  ["5","10","20","50"].forEach(v=>{
    document.getElementById("btn-"+v).classList.toggle("selected",parseInt(v)===n);
  });
}

async function doTopup(){
  if(selectedCard===null) return;
  const c = cards[selectedCard];
  const amt = parseInt(document.getElementById("f-amount").value)||0;
  if(amt<=0) return;

  const url = document.getElementById("server-url").value.trim().replace(/\/$/,"");
  const uid = c.uid.toUpperCase().replace(/:/g,"");
  const btn = document.getElementById("topup-btn");

  btn.textContent="Adding...";
  btn.disabled=true;

  try{
    const r = await fetch(url+"/api/cards/"+uid+"/topup",{
      method:"POST",
      headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},
      body: JSON.stringify({amount: amt})
    });
    const data = await r.json();
    if(data.success){
      // Update local card data
      cards[selectedCard].tokens = data.tokens;
      renderCards();
      selectCard(selectedCard);

      const msg = document.getElementById("result-msg");
      msg.style.display="block";
      msg.style.background="#dcfce7";
      msg.style.color="#14532d";
      msg.textContent=`✓ Added ${amt} tokens — new total: ${data.tokens}`;

      setTimeout(()=>{ msg.style.display="none"; },4000);
    } else {
      showError("Server error: "+(data.error||"unknown"));
    }
  }catch(e){
    showError("Failed — check ngrok and server");
  }

  btn.textContent="Add tokens";
  btn.disabled=false;
}

function showError(msg){
  const el = document.getElementById("result-msg");
  el.style.display="block";
  el.style.background="#fee2e2";
  el.style.color="#7f1d1d";
  el.textContent="✗ "+msg;
}

function formatUID(uid){
  if(uid.includes(":")) return uid.toUpperCase();
  return uid.toUpperCase().match(/.{1,2}/g).join(":");
}

// Auto load on start
setTimeout(loadCards, 500);
</script>
