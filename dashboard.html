<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f1f5f9;min-height:100vh}
.header{background:#0f172a;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:10px;background:#16a34a;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text{font-size:17px;font-weight:700;color:#fff}
.logo-sub{font-size:11px;color:#94a3b8;margin-top:2px;display:flex;align-items:center;gap:6px}
.hdot{width:8px;height:8px;border-radius:50%;display:inline-block}
.header-actions{display:flex;gap:8px}
.btn{padding:9px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.btn:hover{background:rgba(255,255,255,.1)}
.btn-green{background:#16a34a;border-color:#16a34a}
.btn-green:hover{background:#15803d}
.main{padding:24px 28px;max-width:1200px;margin:0 auto}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric{background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0}
.metric-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.metric-val{font-size:30px;font-weight:700;color:#0f172a}
.green{color:#16a34a}.amber{color:#d97706}.blue{color:#2563eb}
.section-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-label{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:24px}
.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden}
.card-stripe{height:4px}
.card-body{padding:18px 20px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.card-name{font-size:16px;font-weight:700;color:#0f172a}
.card-uid{font-size:11px;color:#94a3b8;font-family:monospace;margin-top:3px}
.card-time{font-size:10px;color:#94a3b8;margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600}
.pdot{width:6px;height:6px;border-radius:50%}
.divider{border:none;border-top:1px solid #f1f5f9;margin:0 0 12px}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stat-key{font-size:12px;color:#64748b}
.stat-val{font-size:13px;font-weight:600;color:#0f172a}
.token-num{font-size:28px;font-weight:700}
.card-footer{padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;gap:8px}
.ft-btn{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#374151}
.ft-btn:hover{background:#f8fafc}
.ft-btn.primary{background:#16a34a;border-color:#16a34a;color:#fff}
.ft-btn.primary:hover{background:#15803d}
.ft-btn.danger{border-color:#fecaca;color:#dc2626}
.ft-btn.danger:hover{background:#fef2f2}
.log-box{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:18px 20px;margin-bottom:24px}
.log-title{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;justify-content:space-between}
.log-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f8fafc}
.log-time{font-size:10px;color:#94a3b8;font-family:monospace;white-space:nowrap;min-width:75px}
.log-msg{font-size:12px}
.log-empty{font-size:12px;color:#94a3b8;padding:8px 0}
.empty-state{grid-column:1/-1;padding:3rem;text-align:center;background:#fff;border-radius:14px;border:1px dashed #e2e8f0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:400px;max-width:95vw}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-size:17px;font-weight:700;color:#0f172a}
.modal-close{border:none;background:none;font-size:24px;color:#94a3b8;cursor:pointer}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.field input:focus{border-color:#16a34a}
.field small{font-size:11px;color:#94a3b8;margin-top:4px;display:block}
.modal-footer{display:flex;gap:10px;margin-top:20px}
.m-cancel{flex:1;padding:11px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#374151}
.m-save{flex:2;padding:11px;border-radius:8px;border:none;background:#16a34a;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.m-save:hover{background:#15803d}
.m-save:disabled{background:#94a3b8;cursor:not-allowed}
.curr-box{background:#f8fafc;border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e2e8f0}
.amt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.amt-btn{padding:10px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;font-size:13px;font-weight:700;cursor:pointer;color:#374151}
.amt-btn:hover{border-color:#16a34a;color:#16a34a}
.amt-btn.active{background:#16a34a;border-color:#16a34a;color:#fff}
.result-msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;margin-top:12px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🎱</div>
    <div>
      <div class="logo-text">Pool manager</div>
      <div class="logo-sub">
        <span class="hdot" id="api-dot" style="background:#d97706"></span>
        <span id="api-label">Connecting...</span>
      </div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="loadCards()">↻ Refresh</button>
    <button class="btn btn-green" onclick="openAdd()">+ Add table</button>
  </div>
</div>

<div class="main">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total tables</div><div class="metric-val" id="m-total">—</div></div>
    <div class="metric"><div class="metric-label">GSM active</div><div class="metric-val blue" id="m-active">—</div></div>
    <div class="metric"><div class="metric-label">Idle</div><div class="metric-val green" id="m-idle">—</div></div>
    <div class="metric"><div class="metric-label">Low / no tokens</div><div class="metric-val amber" id="m-low">—</div></div>
  </div>
  <div class="section-bar">
    <span class="section-label">Tables</span>
    <span style="font-size:12px;color:#94a3b8" id="tbl-count"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="log-box">
    <div class="log-title">
      <span>Event log</span>
      <button onclick="clearLog()" style="border:none;background:none;font-size:11px;color:#94a3b8;cursor:pointer">Clear</button>
    </div>
    <div id="log-list"><div class="log-empty">No events yet...</div></div>
  </div>
</div>

<div class="overlay" id="overlay-add" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Add table</span>
      <button class="modal-close" onclick="closeAdd()">×</button>
    </div>
    <div class="field"><label>Table name</label><input id="f-name" type="text" placeholder="e.g. RUGIRA pool"></div>
    <div class="field"><label>Card UID (RFID)</label><input id="f-uid" type="text" placeholder="AA:BB:CC:DD" style="font-family:monospace"><small>Scan with RC522 test sketch</small></div>
    <div class="field"><label>Initial tokens</label><input id="f-tokens" type="number" value="0" min="0"></div>
    <div id="add-msg" class="result-msg"></div>
    <div class="modal-footer">
      <button class="m-cancel" onclick="closeAdd()">Cancel</button>
      <button class="m-save" id="add-btn" onclick="savePool()">Save table</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay-topup" onclick="if(event.target===this)closeTopup()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="topup-title">Add tokens</span>
      <button class="modal-close" onclick="closeTopup()">×</button>
    </div>
    <div class="curr-box">
      <div><div style="font-size:12px;color:#64748b" id="topup-name">Table</div><div style="font-size:11px;color:#94a3b8;font-family:monospace;margin-top:2px" id="topup-uid"></div></div>
      <div style="text-align:right"><div style="font-size:11px;color:#64748b">Current tokens</div><div style="font-size:28px;font-weight:700" id="topup-current">0</div></div>
    </div>
    <div class="amt-grid">
      <button class="amt-btn" onclick="setAmt(5)"  id="amt-5">+5</button>
      <button class="amt-btn" onclick="setAmt(10)" id="amt-10">+10</button>
      <button class="amt-btn" onclick="setAmt(20)" id="amt-20">+20</button>
      <button class="amt-btn" onclick="setAmt(50)" id="amt-50">+50</button>
    </div>
    <div class="field"><label>Custom amount</label><input id="f-topup" type="number" value="5" min="1" oninput="clearAmtBtns()"></div>
    <div id="topup-msg" class="result-msg"></div>
    <div class="modal-footer">
      <button class="m-cancel" onclick="closeTopup()">Cancel</button>
      <button class="m-save" id="topup-btn" onclick="confirmTopup()">Add tokens</button>
    </div>
  </div>
</div>

<script>
const API = "https://billia-0o961den.b4a.run";
let pools = [], topupTarget = null, eventLog = [];

const ST = {
  active:{ stripe:"#2563eb", pill:"#dbeafe", pt:"#1e3a8a", dot:"#2563eb", label:"GSM active" },
  idle:  { stripe:"#16a34a", pill:"#dcfce7", pt:"#14532d", dot:"#16a34a", label:"Idle" },
  warn:  { stripe:"#d97706", pill:"#fef3c7", pt:"#78350f", dot:"#d97706", label:"Low tokens" },
  empty: { stripe:"#dc2626", pill:"#fee2e2", pt:"#7f1d1d", dot:"#dc2626", label:"No tokens" },
};

function statusOf(p){ if(p.status==="active")return"active"; if(p.tokens===0)return"empty"; if(p.tokens<=2)return"warn"; return"idle"; }
function tc(t){ return t===0?"#dc2626":t<=2?"#d97706":"#16a34a"; }
function ts(){ return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}); }
function fmtUID(uid){ if(!uid)return""; uid=uid.toUpperCase(); if(uid.includes(":"))return uid; return uid.match(/.{1,2}/g).join(":"); }

function addLog(msg,color="#374151"){ eventLog.unshift({msg,color,time:ts()}); if(eventLog.length>12)eventLog.pop(); renderLog(); }
function clearLog(){ eventLog=[]; renderLog(); }
function renderLog(){
  const el=document.getElementById("log-list");
  if(!eventLog.length){el.innerHTML='<div class="log-empty">No events yet...</div>';return;}
  el.innerHTML=eventLog.map(l=>`<div class="log-row"><span class="log-time">${l.time}</span><span class="log-msg" style="color:${l.color}">${l.msg}</span></div>`).join("");
}

function render(){
  const active=pools.filter(p=>p.status==="active").length;
  const idle=pools.filter(p=>p.status!=="active"&&p.tokens>2).length;
  const low=pools.filter(p=>p.tokens<=2).length;
  document.getElementById("m-total").textContent=pools.length;
  document.getElementById("m-active").textContent=active;
  document.getElementById("m-idle").textContent=idle;
  document.getElementById("m-low").textContent=low;
  document.getElementById("tbl-count").textContent=pools.length+" table"+(pools.length!==1?"s":"");
  if(!pools.length){
    document.getElementById("grid").innerHTML='<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">🎱</div><div style="font-size:15px;font-weight:600;color:#475569;margin-bottom:6px">No tables yet</div><div style="font-size:13px;color:#94a3b8">Click "+ Add table" to get started</div></div>';
    return;
  }
  document.getElementById("grid").innerHTML=pools.map(p=>{
    const s=statusOf(p);const st=ST[s];
    return`<div class="card">
      <div class="card-stripe" style="background:${st.stripe}"></div>
      <div class="card-body">
        <div class="card-head">
          <div>
            <div class="card-name">${p.owner||"Unknown"}</div>
            <div class="card-uid">${fmtUID(p.uid)}</div>
            <div class="card-time">${p.lastAccess?"Last use: "+new Date(p.lastAccess).toLocaleString():"Never used"}</div>
          </div>
          <span class="pill" style="background:${st.pill};color:${st.pt}">
            <span class="pdot" style="background:${st.dot}"></span>${st.label}
          </span>
        </div>
        <hr class="divider">
        <div class="stat-row"><span class="stat-key">Available tokens</span><span class="token-num" style="color:${tc(p.tokens)}">${p.tokens}</span></div>
        <div class="stat-row"><span class="stat-key">Card UID</span><span class="stat-val" style="font-family:monospace;font-size:11px">${fmtUID(p.uid)}</span></div>
        <div class="stat-row" style="margin-bottom:0"><span class="stat-key">Status</span><span class="stat-val" style="color:${st.stripe}">${p.status==="active"?"GSM Online ✓":p.tokens===0?"No tokens":p.tokens<=2?"Low tokens":"Ready"}</span></div>
      </div>
      <div class="card-footer">
        <button class="ft-btn primary" onclick="openTopup('${p._id}')">+ Add tokens</button>
        <button class="ft-btn" onclick="syncCard('${p.uid}')">↻ Sync</button>
        <button class="ft-btn danger" onclick="removePool('${p._id}','${p.uid}','${p.owner||p.uid}')">✕</button>
      </div>
    </div>`;
  }).join("");
}

async function loadCards(){
  document.getElementById("api-dot").style.background="#d97706";
  document.getElementById("api-label").textContent="Loading...";
  try{
    const r=await fetch(API+"/api/cards");
    if(!r.ok)throw new Error("HTTP "+r.status);
    pools=await r.json();
    document.getElementById("api-dot").style.background="#16a34a";
    document.getElementById("api-label").textContent="Connected · onrender.com · auto-refresh 30s";
    addLog("Loaded "+pools.length+" table"+(pools.length!==1?"s":""),"#2563eb");
    render();
  }catch(e){
    document.getElementById("api-dot").style.background="#dc2626";
    document.getElementById("api-label").textContent="Cannot reach server";
    addLog("Server unreachable: "+e.message,"#dc2626");
  }
}

async function syncCard(uid){
  try{
    const r=await fetch(API+"/api/cards/"+uid.replace(/:/g,""));
    const data=await r.json();
    if(data.success){
      const p=pools.find(p=>p.uid===uid||p.uid===uid.replace(/:/g,""));
      if(p){p.tokens=data.tokens;p.status=data.status;}
      addLog("Synced "+fmtUID(uid)+" → "+data.tokens+" tokens","#16a34a");
      render();
    }
  }catch(e){addLog("Sync failed","#dc2626");}
}

function openAdd(){ document.getElementById("overlay-add").classList.add("open"); document.getElementById("add-msg").style.display="none"; }
function closeAdd(){ document.getElementById("overlay-add").classList.remove("open"); }

async function savePool(){
  const name=document.getElementById("f-name").value.trim();
  const uid=document.getElementById("f-uid").value.trim().toUpperCase().replace(/:/g,"");
  const tokens=parseInt(document.getElementById("f-tokens").value)||0;
  if(!name){showMsg("add-msg","Enter table name","#fee2e2","#7f1d1d");return;}
  if(!uid){showMsg("add-msg","Enter card UID","#fee2e2","#7f1d1d");return;}
  const btn=document.getElementById("add-btn");
  btn.innerHTML='<span class="spinner"></span>Saving...';btn.disabled=true;
  try{
    const r=await fetch(API+"/api/cards",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({uid,owner:name,tokens})});
    const data=await r.json();
    if(data.success){
      showMsg("add-msg","Saved!","#dcfce7","#14532d");
      addLog("Table added: "+name+" ("+tokens+" tokens)","#16a34a");
      document.getElementById("f-name").value="";
      document.getElementById("f-uid").value="";
      document.getElementById("f-tokens").value="0";
      setTimeout(()=>{closeAdd();loadCards();},1200);
    }else{showMsg("add-msg","Error: "+(data.error||"unknown"),"#fee2e2","#7f1d1d");}
  }catch(e){showMsg("add-msg","Failed to reach server","#fee2e2","#7f1d1d");}
  btn.innerHTML="Save table";btn.disabled=false;
}

function openTopup(id){
  topupTarget=id;
  const p=pools.find(p=>p._id===id);if(!p)return;
  document.getElementById("topup-title").textContent="Add tokens — "+(p.owner||p.uid);
  document.getElementById("topup-name").textContent=p.owner||p.uid;
  document.getElementById("topup-uid").textContent=fmtUID(p.uid);
  document.getElementById("topup-current").textContent=p.tokens;
  document.getElementById("topup-current").style.color=tc(p.tokens);
  document.getElementById("topup-msg").style.display="none";
  setAmt(5);
  document.getElementById("overlay-topup").classList.add("open");
}
function closeTopup(){ document.getElementById("overlay-topup").classList.remove("open"); }
function setAmt(n){ document.getElementById("f-topup").value=n; [5,10,20,50].forEach(v=>document.getElementById("amt-"+v).classList.toggle("active",v===n)); }
function clearAmtBtns(){ [5,10,20,50].forEach(v=>document.getElementById("amt-"+v).classList.remove("active")); }

async function confirmTopup(){
  const amt=parseInt(document.getElementById("f-topup").value)||0;
  if(!topupTarget||amt<=0){showMsg("topup-msg","Enter valid amount","#fee2e2","#7f1d1d");return;}
  const p=pools.find(p=>p._id===topupTarget);if(!p)return;
  const btn=document.getElementById("topup-btn");
  btn.innerHTML='<span class="spinner"></span>Adding...';btn.disabled=true;
  try{
    const r=await fetch(API+"/api/cards/"+p.uid+"/topup",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:amt})});
    const data=await r.json();
    if(data.success){
      showMsg("topup-msg","✓ Added "+amt+" — total: "+data.tokens,"#dcfce7","#14532d");
      addLog("Tokens added — "+(p.owner||p.uid)+" → "+data.tokens+" total","#16a34a");
      p.tokens=data.tokens;render();
      setTimeout(()=>{closeTopup();},1500);
    }else{showMsg("topup-msg","Error: "+(data.error||"unknown"),"#fee2e2","#7f1d1d");}
  }catch(e){showMsg("topup-msg","Failed to reach server","#fee2e2","#7f1d1d");}
  btn.innerHTML="Add tokens";btn.disabled=false;
}

async function removePool(id, uid, name){
  if(!confirm("Remove "+name+"?")) return;
  try{
    await fetch(API+"/api/cards/"+uid.replace(/:/g,""),{method:"DELETE"});
    addLog("Removed: "+name,"#dc2626");
    loadCards();
  }catch(e){
    addLog("Error removing: "+e.message,"#dc2626");
  }
}

function showMsg(id,msg,bg,color){ const el=document.getElementById(id); el.style.display="block"; el.style.background=bg; el.style.color=color; el.textContent=msg; }

loadCards();
setInterval(loadCards,30000);
</script>
</body>
</html>
