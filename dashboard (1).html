<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool Manager</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f1f5f9;min-height:100vh}
.header{background:#0f172a;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:10px;background:#16a34a;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text{font-size:17px;font-weight:700;color:#fff}
.logo-sub{font-size:11px;color:#94a3b8;margin-top:2px;display:flex;align-items:center;gap:6px}
.hdot{width:8px;height:8px;border-radius:50%;display:inline-block;transition:background .3s}
.add-btn{padding:10px 20px;border-radius:9px;border:none;background:#16a34a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.add-btn:hover{background:#15803d}
.main{padding:24px 28px;max-width:1200px;margin:0 auto}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric{background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0}
.metric-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.metric-val{font-size:30px;font-weight:700;color:#0f172a}
.metric-val.green{color:#16a34a}
.metric-val.amber{color:#d97706}
.metric-val.blue{color:#2563eb}
.section-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:24px}
.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;transition:transform .1s}
.card:hover{transform:translateY(-1px)}
.card-stripe{height:4px;transition:background .3s}
.card-body{padding:18px 20px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.card-name{font-size:16px;font-weight:700;color:#0f172a}
.card-uid{font-size:11px;color:#94a3b8;font-family:monospace;margin-top:3px}
.card-scan{font-size:10px;color:#94a3b8;margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;transition:all .3s}
.pdot{width:6px;height:6px;border-radius:50%;display:inline-block}
.divider{border:none;border-top:1px solid #f1f5f9;margin:0 0 14px}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stat-key{font-size:12px;color:#64748b;display:flex;align-items:center;gap:5px}
.stat-val{font-size:13px;font-weight:600;color:#0f172a}
.token-num{font-size:28px;font-weight:700;transition:color .3s}
.card-footer{padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;gap:8px}
.ft-btn{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#374151;transition:all .1s}
.ft-btn:hover{background:#f8fafc}
.ft-btn.green{background:#16a34a;border-color:#16a34a;color:#fff}
.ft-btn.green:hover{background:#15803d}
.ft-btn.red{border-color:#fecaca;color:#dc2626}
.ft-btn.red:hover{background:#fef2f2}
.gsm-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;margin-top:6px}
.log-box{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:18px 20px;margin-bottom:24px}
.log-title{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.log-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f8fafc}
.log-time{font-size:10px;color:#94a3b8;font-family:monospace;white-space:nowrap;padding-top:1px;min-width:70px}
.log-msg{font-size:12px;line-height:1.5}
.log-empty{font-size:12px;color:#94a3b8;padding:8px 0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-size:17px;font-weight:700;color:#0f172a}
.modal-close{border:none;background:none;font-size:24px;color:#94a3b8;cursor:pointer;line-height:1}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.field input:focus{border-color:#16a34a;box-shadow:0 0 0 2px #dcfce7}
.field small{font-size:11px;color:#94a3b8;margin-top:3px;display:block}
.modal-footer{display:flex;gap:10px;margin-top:20px}
.m-cancel{flex:1;padding:11px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#374151}
.m-save{flex:2;padding:11px;border-radius:8px;border:none;background:#16a34a;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.m-save:hover{background:#15803d}
.curr-box{background:#f8fafc;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.curr-label{font-size:13px;color:#64748b}
.curr-val{font-size:28px;font-weight:700}
.empty-state{grid-column:1/-1;padding:3rem;text-align:center;background:#fff;border-radius:14px;border:1px dashed #e2e8f0;color:#94a3b8}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🎱</div>
    <div>
      <div class="logo-text">Pool manager</div>
      <div class="logo-sub">
        <span class="hdot" id="mqtt-dot" style="background:#d97706"></span>
        <span id="mqtt-label">Connecting to HiveMQ...</span>
      </div>
    </div>
  </div>
  <button class="add-btn" onclick="openAdd()">
    <span style="font-size:18px;line-height:1">+</span> Add table
  </button>
</div>

<div class="main">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total tables</div><div class="metric-val" id="m-total">0</div></div>
    <div class="metric"><div class="metric-label">Active (GSM online)</div><div class="metric-val blue" id="m-active">0</div></div>
    <div class="metric"><div class="metric-label">Idle</div><div class="metric-val green" id="m-idle">0</div></div>
    <div class="metric"><div class="metric-label">Low / no tokens</div><div class="metric-val amber" id="m-low">0</div></div>
  </div>

  <div class="section-bar">
    <span class="section-title">Tables</span>
    <span style="font-size:12px;color:#94a3b8" id="tbl-count"></span>
  </div>
  <div class="grid" id="grid"></div>

  <div class="log-box">
    <div class="log-title">
      <span>Live event log</span>
      <button onclick="clearLog()" style="border:none;background:none;font-size:11px;color:#94a3b8;cursor:pointer">Clear</button>
    </div>
    <div id="log-list"><div class="log-empty">Waiting for events...</div></div>
  </div>
</div>

<!-- Add table modal -->
<div class="overlay" id="overlay-add" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Add table</span>
      <button class="modal-close" onclick="closeAdd()">×</button>
    </div>
    <div class="field">
      <label>Table name</label>
      <input id="f-name" type="text" placeholder="e.g. RUGIRA pool">
    </div>
    <div class="field">
      <label>Card UID (from RC522)</label>
      <input id="f-uid" type="text" placeholder="AA:BB:CC:DD" style="font-family:monospace">
      <small>Scan the card using the RC522 test sketch to get the UID</small>
    </div>
    <div class="field">
      <label>Initial tokens</label>
      <input id="f-tokens" type="number" value="0" min="0">
    </div>
    <div class="modal-footer">
      <button class="m-cancel" onclick="closeAdd()">Cancel</button>
      <button class="m-save" onclick="savePool()">Save table</button>
    </div>
  </div>
</div>

<!-- Add tokens modal -->
<div class="overlay" id="overlay-topup" onclick="if(event.target===this)closeTopup()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="topup-title">Add tokens</span>
      <button class="modal-close" onclick="closeTopup()">×</button>
    </div>
    <div class="curr-box">
      <span class="curr-label" id="topup-name">Table</span>
      <span class="curr-val" id="topup-current" style="color:#16a34a">0</span>
    </div>
    <div class="field">
      <label>Tokens to add</label>
      <input id="f-topup" type="number" value="5" min="1">
      <small>GSM will pick up new tokens on next sync</small>
    </div>
    <div class="modal-footer">
      <button class="m-cancel" onclick="closeTopup()">Cancel</button>
      <button class="m-save" onclick="confirmTopup()">Add tokens</button>
    </div>
  </div>
</div>

<script>
const BROKER    = "wss://43f1ecd47dea4aef897d2326b80331a5.s1.eu.hivemq.cloud:8884/mqtt";
const MQTT_USER = "DEI_I";
const MQTT_PASS = "devDei19!";
const SERVER    = "https://utensil-nearest-snide.ngrok-free.dev";

let pools = [];
let topupTarget = null;
let eventLog = [];
let client = null;

// Status config
const ST = {
  active: { stripe:"#2563eb", pill:"#dbeafe", pt:"#1e3a8a", dot:"#2563eb", label:"GSM active" },
  idle:   { stripe:"#16a34a", pill:"#dcfce7", pt:"#14532d", dot:"#16a34a", label:"Idle" },
  warn:   { stripe:"#d97706", pill:"#fef3c7", pt:"#78350f", dot:"#d97706", label:"Low tokens" },
  empty:  { stripe:"#dc2626", pill:"#fee2e2", pt:"#7f1d1d", dot:"#dc2626", label:"No tokens" },
};

function statusOf(p){
  if(p.gsmOnline) return "active";
  if(p.tokens===0) return "empty";
  if(p.tokens<=2)  return "warn";
  return "idle";
}
function tc(t){ return t===0?"#dc2626":t<=2?"#d97706":"#16a34a"; }
function ts(){ return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}); }

function addLog(msg, color="#374151"){
  eventLog.unshift({msg, color, time:ts()});
  if(eventLog.length>10) eventLog.pop();
  renderLog();
}

function clearLog(){ eventLog=[]; renderLog(); }

function renderLog(){
  const el = document.getElementById("log-list");
  if(!eventLog.length){ el.innerHTML='<div class="log-empty">Waiting for events...</div>'; return; }
  el.innerHTML = eventLog.map(l=>`
    <div class="log-row">
      <span class="log-time">${l.time}</span>
      <span class="log-msg" style="color:${l.color}">${l.msg}</span>
    </div>`).join("");
}

function render(){
  const active = pools.filter(p=>p.gsmOnline).length;
  const idle   = pools.filter(p=>!p.gsmOnline&&p.tokens>2).length;
  const low    = pools.filter(p=>p.tokens<=2).length;

  document.getElementById("m-total").textContent  = pools.length;
  document.getElementById("m-active").textContent = active;
  document.getElementById("m-idle").textContent   = idle;
  document.getElementById("m-low").textContent    = low;
  document.getElementById("tbl-count").textContent = pools.length+" table"+(pools.length!==1?"s":"");

  if(!pools.length){
    document.getElementById("grid").innerHTML=`
      <div class="empty-state">
        <div style="font-size:40px;margin-bottom:12px">🎱</div>
        <div style="font-size:15px;font-weight:600;color:#475569;margin-bottom:6px">No tables yet</div>
        <div style="font-size:13px">Click "+ Add table" to register your first pool table</div>
      </div>`;
    return;
  }

  document.getElementById("grid").innerHTML = pools.map(p=>{
    const s=statusOf(p); const st=ST[s];
    return `
    <div class="card">
      <div class="card-stripe" style="background:${st.stripe}"></div>
      <div class="card-body">
        <div class="card-head">
          <div>
            <div class="card-name">${p.name}</div>
            <div class="card-uid">${p.uid}</div>
            ${p.lastScan?`<div class="card-scan">Last scan: ${p.lastScan}</div>`:""}
            ${p.gsmOnline?`<div class="gsm-badge" style="background:#dbeafe;color:#1e3a8a">
              <span style="width:6px;height:6px;border-radius:50%;background:#2563eb;display:inline-block" class="pulse"></span>
              GSM online
            </div>`:""}
          </div>
          <span class="pill" style="background:${st.pill};color:${st.pt}">
            <span class="pdot" style="background:${st.dot}"></span>${st.label}
          </span>
        </div>
        <hr class="divider">
        <div class="stat-row">
          <span class="stat-key">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
            Available tokens
          </span>
          <span class="token-num" style="color:${tc(p.tokens)}">${p.tokens}</span>
        </div>
        <div class="stat-row">
          <span class="stat-key">Card UID</span>
          <span class="stat-val" style="font-family:monospace;font-size:11px">${p.uid}</span>
        </div>
        <div class="stat-row" style="margin-bottom:0">
          <span class="stat-key">Status</span>
          <span class="stat-val" style="color:${st.stripe}">${p.gsmOnline?"Running (GSM active)":p.tokens>0?"Ready":"No tokens"}</span>
        </div>
      </div>
      <div class="card-footer">
        <button class="ft-btn green" onclick="openTopup('${p.id}')">+ Add tokens</button>
        <button class="ft-btn" onclick="removePool('${p.id}')" style="flex:0;padding:9px 14px">🗑</button>
      </div>
    </div>`;
  }).join("");
}

// ── MQTT ──────────────────────────────────────────────────────
function connectMQTT(){
  client = mqtt.connect(BROKER,{
    username: MQTT_USER, password: MQTT_PASS,
    clientId: "dash_"+Math.random().toString(16).slice(2,8),
    reconnectPeriod: 3000
  });

  client.on("connect",()=>{
    document.getElementById("mqtt-dot").style.background="#16a34a";
    document.getElementById("mqtt-label").textContent="Live · HiveMQ Cloud";
    client.subscribe("pool/state",{qos:1});
    client.subscribe("pool/access/result",{qos:1});
    client.subscribe("pool/gsm/status",{qos:1});
    addLog("Dashboard connected to HiveMQ Cloud","#16a34a");
    loadFromServer();
  });

  client.on("message",(topic,payload)=>{
    try{
      const msg = JSON.parse(payload.toString());

      if(topic==="pool/state" && Array.isArray(msg)){
        msg.forEach(srv=>{
          const uid = srv.uid.toUpperCase();
          let p = pools.find(p=>p.uid.replace(/:/g,"")===uid||p.uid.toUpperCase()===uid);
          if(p){
            p.tokens = srv.tokens;
            if(srv.status==="active") p.gsmOnline=true;
            else if(srv.status==="idle"||srv.status==="empty") p.gsmOnline=false;
          }
        });
        render();
      }

      if(topic==="pool/access/result"){
        const uid=(msg.uid||"").toUpperCase();
        const p=pools.find(p=>p.uid.replace(/:/g,"")===uid.replace(/:/g,""));
        if(p){
          p.tokens=msg.tokens??p.tokens;
          p.lastScan=ts();
          p.gsmOnline=true;
          addLog(`✓ Card used — ${p.name} — ${msg.tokens} token${msg.tokens!==1?"s":""} left`,"#16a34a");
          // GSM goes offline after 30s of no activity
          clearTimeout(p._timer);
          p._timer=setTimeout(()=>{ p.gsmOnline=false; render(); },30000);
          render();
        }
      }

      if(topic==="pool/gsm/status"){
        // GSM publishes { uid, online: true/false } on connect/disconnect
        const uid=(msg.uid||"").toUpperCase().replace(/:/g,"");
        const p=pools.find(p=>p.uid.replace(/:/g,"")===uid);
        if(p){
          p.gsmOnline=msg.online;
          addLog(msg.online?`GSM online — ${p.name}`:`GSM offline — ${p.name}`,
                 msg.online?"#2563eb":"#94a3b8");
          render();
        }
      }

    }catch(e){console.error(e);}
  });

  client.on("offline",()=>{
    document.getElementById("mqtt-dot").style.background="#dc2626";
    document.getElementById("mqtt-label").textContent="Offline — reconnecting...";
  });

  client.on("reconnect",()=>{
    document.getElementById("mqtt-dot").style.background="#d97706";
    document.getElementById("mqtt-label").textContent="Reconnecting...";
  });
}

// ── Load from server ──────────────────────────────────────────
async function loadFromServer(){
  try{
    const r = await fetch(SERVER+"/api/cards",{
      headers:{"ngrok-skip-browser-warning":"true"}
    });
    const cards = await r.json();
    pools = cards.map(c=>({
      id: c._id||c.uid,
      name: c.owner||c.uid,
      uid: formatUID(c.uid),
      tokens: c.tokens,
      status: c.status||"idle",
      gsmOnline: c.status==="active",
      lastScan: null,
      _timer: null
    }));
    render();
    addLog("Loaded "+pools.length+" table"+(pools.length!==1?"s":"")+" from database","#2563eb");
  }catch(e){
    addLog("Could not load from server — check ngrok","#dc2626");
    console.error(e);
  }
}

function formatUID(uid){
  // Convert "3247434D" to "32:47:43:4D"
  if(uid.includes(":")) return uid.toUpperCase();
  return uid.toUpperCase().match(/.{1,2}/g).join(":");
}

// ── Add table ─────────────────────────────────────────────────
function openAdd(){ document.getElementById("overlay-add").classList.add("open"); }
function closeAdd(){ document.getElementById("overlay-add").classList.remove("open"); }

async function savePool(){
  const name   = document.getElementById("f-name").value.trim();
  const uid    = document.getElementById("f-uid").value.trim().toUpperCase();
  const tokens = parseInt(document.getElementById("f-tokens").value)||0;
  if(!name||!uid){ alert("Please fill in table name and card UID"); return; }

  try{
    const r = await fetch(SERVER+"/api/cards",{
      method:"POST",
      headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},
      body: JSON.stringify({ uid: uid.replace(/:/g,""), owner: name, tokens })
    });
    const data = await r.json();
    if(data.success){
      const c = data.card;
      pools.push({
        id: c._id||c.uid,
        name, uid: formatUID(c.uid),
        tokens: c.tokens,
        gsmOnline: false,
        lastScan: null,
        _timer: null
      });
      addLog("Table added: "+name+" ("+tokens+" tokens)","#16a34a");
      render();
      closeAdd();
      document.getElementById("f-name").value="";
      document.getElementById("f-uid").value="";
      document.getElementById("f-tokens").value="0";
    }
  }catch(e){
    addLog("Error adding table — check server","#dc2626");
    console.error(e);
  }
}

// ── Add tokens ────────────────────────────────────────────────
function openTopup(id){
  topupTarget=id;
  const p=pools.find(p=>p.id===id);
  document.getElementById("topup-title").textContent="Add tokens — "+p.name;
  document.getElementById("topup-name").textContent=p.name+" current tokens";
  document.getElementById("topup-current").textContent=p.tokens;
  document.getElementById("topup-current").style.color=tc(p.tokens);
  document.getElementById("f-topup").value="5";
  document.getElementById("overlay-topup").classList.add("open");
}
function closeTopup(){ document.getElementById("overlay-topup").classList.remove("open"); }

async function confirmTopup(){
  const amt=parseInt(document.getElementById("f-topup").value)||0;
  if(!topupTarget||amt<=0) return;
  const p=pools.find(p=>p.id===topupTarget);
  if(!p) return;

  const uid=p.uid.replace(/:/g,"");
  try{
    const r=await fetch(SERVER+"/api/cards/"+uid+"/topup",{
      method:"POST",
      headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},
      body:JSON.stringify({amount:amt})
    });
    const data=await r.json();
    if(data.success){
      p.tokens=data.tokens;
      addLog("Tokens added — "+p.name+" → "+data.tokens+" tokens total","#16a34a");
      render();
    }
  }catch(e){
    // Optimistic update if server unreachable
    p.tokens+=amt;
    addLog("Tokens added locally — "+p.name+" (server may be offline)","#d97706");
    render();
    console.error(e);
  }
  closeTopup();
}

// ── Remove pool ───────────────────────────────────────────────
function removePool(id){
  const p=pools.find(p=>p.id===id);
  if(!p||!confirm("Remove "+p.name+"?")) return;
  pools=pools.filter(p=>p.id!==id);
  addLog("Table removed: "+p.name,"#dc2626");
  render();
}

// ── Init ──────────────────────────────────────────────────────
render();
connectMQTT();
</script>
</body>
</html>
